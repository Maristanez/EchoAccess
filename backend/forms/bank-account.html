<form id="td-bank-account-application" aria-label="TD Bank Account Application">
  <fieldset>
    <legend>Personal Information</legend>

    <label for="first_name">First Name</label>
    <input type="text" id="first_name" name="first_name" required placeholder="Enter your legal first name" />

    <label for="last_name">Last Name</label>
    <input type="text" id="last_name" name="last_name" required placeholder="Enter your legal last name" />

    <label for="date_of_birth">Date of Birth</label>
    <input type="date" id="date_of_birth" name="date_of_birth" required />

    <label for="sin">Social Insurance Number (SIN)</label>
    <input type="text" id="sin" name="sin" placeholder="Optional — 9 digits" />
  </fieldset>

  <fieldset>
    <legend>Contact Information</legend>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="example@email.com" />

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" required placeholder="(416) 555-0123" />
  </fieldset>

  <fieldset>
    <legend>Home Address</legend>

    <label for="street_address">Street Address</label>
    <input type="text" id="street_address" name="street_address" required placeholder="123 Main Street" />

    <label for="city">City</label>
    <input type="text" id="city" name="city" required placeholder="Toronto" />

    <label for="province">Province</label>
    <select id="province" name="province" required>
      <option value="">Select a province</option>
      <option value="ON">Ontario</option>
      <option value="BC">British Columbia</option>
      <option value="AB">Alberta</option>
      <option value="QC">Quebec</option>
      <option value="MB">Manitoba</option>
      <option value="SK">Saskatchewan</option>
      <option value="NS">Nova Scotia</option>
      <option value="NB">New Brunswick</option>
      <option value="PE">Prince Edward Island</option>
      <option value="NL">Newfoundland and Labrador</option>
      <option value="NT">Northwest Territories</option>
      <option value="YT">Yukon</option>
      <option value="NU">Nunavut</option>
    </select>

    <label for="postal_code">Postal Code</label>
    <input type="text" id="postal_code" name="postal_code" required placeholder="M5V 1A1" />
  </fieldset>

  <fieldset>
    <legend>Employment &amp; Financial</legend>

    <label for="employment_status">Employment Status</label>
    <select id="employment_status" name="employment_status" required>
      <option value="">Select your employment status</option>
      <option value="employed">Employed</option>
      <option value="self-employed">Self-Employed</option>
      <option value="student">Student</option>
      <option value="retired">Retired</option>
    </select>

    <label for="annual_income">Annual Income</label>
    <select id="annual_income" name="annual_income" required>
      <option value="">Select income range</option>
      <option value="under-25k">Under $25,000</option>
      <option value="25k-50k">$25,000 – $50,000</option>
      <option value="50k-75k">$50,000 – $75,000</option>
      <option value="75k-100k">$75,000 – $100,000</option>
      <option value="100k-plus">$100,000+</option>
    </select>
  </fieldset>

  <button type="submit">Submit Application</button>
</form>
